name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 0 点运行
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以供合并

      - name: Sync and Merge
        run: |
          # 配置 Git 身份
          git config --global user.name "GitHub Action (sync-upstream)"
          git config --global user.email "actions@github.com"
          
          # 添加上游源并拉取
          git remote add upstream https://github.com/imgk/caddy-trojan.git
          git fetch upstream
          
          # 确保在本地 main 分支
          git checkout main
          
          # 尝试合并上游 main 分支
          echo "Attempting to merge upstream/main..."
          if git merge upstream/main -m "chore: merge upstream changes" --allow-unrelated-histories; then
            echo "Merge successful. Pushing to origin..."
            git push origin main
          else
            echo "Conflict detected during merge. Please resolve conflicts manually."
            exit 1
          fi
